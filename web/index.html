<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HyperStream Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #111;
      border-bottom: 1px solid #1e1e1e;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: #00e676;
      letter-spacing: 0.5px;
    }

    .logo span { color: #ffffff; }

    /* ── Status badge ── */
    #status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      background: #1a1a1a;
      border: 1px solid #333;
      transition: all 0.3s ease;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #888;
      transition: background 0.3s ease;
    }

    #status-badge.connecting .dot { background: #ffa726; animation: pulse 1s infinite; }
    #status-badge.live .dot       { background: #00e676; }
    #status-badge.live            { border-color: #00e676; color: #00e676; }
    #status-badge.disconnected .dot { background: #ef5350; }
    #status-badge.disconnected    { color: #ef5350; border-color: #ef5350; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Main content ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Video wrapper ── */
    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 960px;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #1e1e1e;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    video {
      width: 100%;
      display: block;
      min-height: 200px;
      background: #000;
    }

    /* ── Overlay spinner ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      gap: 16px;
      transition: opacity 0.4s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #00e676;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #overlay p {
      font-size: 1rem;
      color: #aaa;
    }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    button:hover { background: #252525; border-color: #555; }

    button.active {
      border-color: #00e676;
      color: #00e676;
    }

    /* ── Info bar ── */
    #info-bar {
      margin-top: 16px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.78rem;
      color: #666;
    }

    .info-item strong { color: #999; margin-right: 4px; }
    .info-item span   { color: #ccc; }
  </style>
</head>
<body>

<header>
  <div class="logo">&#9889; Hyper<span>Stream</span></div>
  <div id="status-badge" class="connecting">
    <div class="dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<main>
  <div class="video-wrapper">
    <video id="video" autoplay playsinline muted></video>

    <div id="overlay">
      <div class="spinner"></div>
      <p id="overlay-text">Connecting to stream...</p>
    </div>
  </div>

  <div class="controls">
    <button id="mute-btn" onclick="toggleMute()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path id="mute-icon-path"
          d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <span id="mute-label">Mute</span>
    </button>
  </div>

  <div id="info-bar">
    <div class="info-item"><strong>Video:</strong><span id="info-video">—</span></div>
    <div class="info-item"><strong>Audio:</strong><span id="info-audio">—</span></div>
    <div class="info-item"><strong>ICE:</strong><span id="info-ice">—</span></div>
  </div>
</main>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let peer = null;
  let muted = false;
  let roomId = null;
  let reconnectTimer = null;

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function setStatus(state, text) {
    const badge = document.getElementById('status-badge');
    badge.className = state;
    document.getElementById('status-text').textContent = text;
  }

  function showOverlay(text) {
    const ov = document.getElementById('overlay');
    ov.innerHTML = `<div class="spinner"></div><p id="overlay-text">${text}</p>`;
    ov.classList.remove('hidden');
  }

  function hideOverlay() {
    document.getElementById('overlay').classList.add('hidden');
  }

  function toggleMute() {
    const video = document.getElementById('video');
    muted = !muted;
    video.muted = muted;
    document.getElementById('mute-label').textContent = muted ? 'Unmute' : 'Mute';
    document.getElementById('mute-btn').classList.toggle('active', muted);

    const path = document.getElementById('mute-icon-path');
    if (muted) {
      path.setAttribute('d',
        'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z');
    } else {
      path.setAttribute('d',
        'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z');
    }
  }

  // ── PeerJS viewer connection ────────────────────────────────────────────────
  function connect(id) {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (peer) { peer.destroy(); peer = null; }

    roomId = id;
    setStatus('connecting', 'Connecting...');
    showOverlay('Connecting to stream...');
    document.getElementById('info-ice').textContent = '—';
    document.getElementById('info-video').textContent = '—';
    document.getElementById('info-audio').textContent = '—';

    peer = new Peer();

    peer.on('error', (err) => {
      console.error('PeerJS error:', err);
      showOverlay('Connection error — retrying...');
      setStatus('disconnected', 'Disconnected');
      scheduleReconnect();
    });

    peer.on('open', () => {
      // Register with broadcaster via DataChannel; broadcaster will call us back with the stream
      const conn = peer.connect(roomId);
      conn.on('error', () => {
        showOverlay('Could not reach broadcaster — retrying...');
        setStatus('disconnected', 'Disconnected');
        scheduleReconnect();
      });
    });

    // Broadcaster calls us once DataChannel is open
    peer.on('call', (call) => {
      call.answer(new MediaStream()); // receive-only — no local tracks to send

      call.on('stream', (remoteStream) => {
        const video = document.getElementById('video');
        video.srcObject = remoteStream;

        const tracks = remoteStream.getTracks();
        const vTrack = tracks.find(t => t.kind === 'video');
        const aTrack = tracks.find(t => t.kind === 'audio');
        if (vTrack) document.getElementById('info-video').textContent = vTrack.label || 'VP8';
        if (aTrack) document.getElementById('info-audio').textContent = aTrack.label || 'Opus';

        setStatus('live', 'LIVE');
        document.getElementById('info-ice').textContent = 'connected';
        hideOverlay();
      });

      call.on('close', () => {
        setStatus('disconnected', 'Disconnected');
        showOverlay('Stream ended — reconnecting...');
        scheduleReconnect();
      });

      call.on('error', () => scheduleReconnect());
    });
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      if (roomId) connect(roomId);
    }, 3000);
  }

  // ── Room input form (shown when no ?room= param) ───────────────────────────
  function showRoomForm() {
    setStatus('disconnected', 'No room');
    const ov = document.getElementById('overlay');
    ov.innerHTML = `
      <p style="color:#aaa;margin-bottom:12px">Enter the room ID from the broadcaster:</p>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
        <input id="room-input" type="text" placeholder="e.g. abc123xyz"
          style="padding:8px 12px;border-radius:6px;border:1px solid #555;
                 background:#1a1a1a;color:#e0e0e0;font-size:0.875rem;width:220px"
          onkeydown="if(event.key==='Enter')submitRoomForm()">
        <button onclick="submitRoomForm()"
          style="padding:8px 18px;border:1px solid #333;border-radius:6px;
                 background:#1a1a1a;color:#e0e0e0;font-size:0.875rem;cursor:pointer">
          Watch
        </button>
      </div>
      <p style="color:#555;font-size:0.75rem;margin-top:10px">
        Or get a full link from the broadcaster
      </p>`;
    ov.classList.remove('hidden');
  }

  function submitRoomForm() {
    const input = document.getElementById('room-input');
    const id = (input ? input.value : '').trim();
    if (!id) return;
    history.replaceState(null, '', `?room=${encodeURIComponent(id)}`);
    connect(id);
  }

  // ── Bootstrap ───────────────────────────────────────────────────────────────
  (function bootstrap() {
    const params = new URLSearchParams(window.location.search);
    const room = params.get('room');
    if (room) {
      connect(room);
    } else {
      showRoomForm();
    }
  })();
</script>
</body>
</html>
